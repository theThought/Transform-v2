<mrSubTemplate>
    <div class="history">
        <div class="pallete-empty">
            <span class="a-label-history">Select an existing word to edit</span>
        </div>
        <div class="pallete-complete">
            <span class="a-label-history">All actions have been completed</span>
        </div>
        <div class="history-inprogress">
            <div class="l-row-history">
                <div class="l-col-history-ftd">
                    
                </div>
                <div class="l-col-history" data-associate-question="triggerword">
                    <!-- Pallete control -->
                </div>

                <div class="l-col-history">
                    <button class="a-button-icon submit">
                        <!-- submit button -->
                    </button>
                    <button class="a-button-icon cancel">
                        <!-- cancel button -->
                    </button>
                </div>
            </div>
        </div>
    </div>
</mrSubTemplate>
