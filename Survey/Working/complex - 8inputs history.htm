<mrSubTemplate>
    <div class="history">
        <div class="history-empty">
            <span class="a-label-history">No history available </span>
        </div>
        <div class="history-inprogress">
            <div class="l-row-template">
                <div class="l-col-history-ftd">
                    
                </div>
                <div class="l-col-history">
                    <div class="l-history-edit">
                        <button class="a-button-icon edit">
                            <img class="a-icon-singlestate" alt="Edit entry" src="https://cdn.ipsosinteractive.com/sandbox/kevin.gray/transform/v2/staging/static/edit.svg" />
                        </button>
                        <img class="a-icon-singlestate " alt="this entry is being edited" src="https://cdn.ipsosinteractive.com/sandbox/kevin.gray/transform/v2/staging/static/edit.svg" alt="Edit record" />
                    </div>
                    <div class="l-history-delete">
                        <button class="a-button-icon delete">
                            <img class="a-icon-singlestate" alt="delete entry" src="https://cdn.ipsosinteractive.com/sandbox/kevin.gray/transform/v2/staging/static/delete.svg" />
                        </button>
                        <button class="a-button-icon reset">
                            <img class="a-icon-singlestate" alt="reset changes" src="https://cdn.ipsosinteractive.com/sandbox/kevin.gray/transform/v2/staging/static/reset.svg" />
                        </button>
                    </div>
                </div>
            </div>
            <div class="l-row-header">
                <div class="l-col">
                    <span class="a-label-question" data-associate-question="triggerword" data-associate-type="label"><!-- Question label --></span>
                </div>
            </div>
            <div class="l-row-history">
                <!-- history rows will be dynamically inserted here -->
            </div>
        </div>
    </div>
</mrSubTemplate>
