<mrSubTemplate>
        <div class="palette-empty">
            <span class="a-label-history">Select an existing word to edit</span>
        </div>
        <div class="palette-complete">
            <span class="a-label-history">All actions have been completed</span>
        </div>
        <div class="palette-inprogress">
            <div class="l-row">
                <div class="l-col" data-width="8">
                    <div class="a-label-question" data-associate-type="label" data-associate-question="triggerword"></div>
                </div>
            </div>
            <div class="l-row">
                <div class="l-col" data-width="6" data-associate-question="triggerword" data-associate-type="control">
                    <!-- Pallete control -->
                </div>

                <div class="l-col" data-width="1">
                    <button class="a-button-icon submit">
                        <!-- submit button -->
                    </button>
                </div>
                <div class="l-col" data-width="1">
                    <button class="a-button-icon cancel">
                        <!-- cancel button -->
                    </button>
                </div>
            </div>
        </div>
    </div>
</mrSubTemplate>
